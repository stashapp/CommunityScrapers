# yaml-language-server: $schema=../../validator/scraper.schema.json
name: DreamTranny
sceneByName:
  action: script
  script:
    - python
    - DreamTranny.py
    - scene-by-name
sceneByQueryFragment:
  action: script
  script:
    - python
    - DreamTranny.py
    - scene-by-query-fragment
sceneByURL:
  - action: script
    url:
      - dreamtranny.com
    script:
      - python
      - DreamTranny.py
      - scene-by-url
galleryByURL:
  - action: scrapeXPath
    url:
      - dreamtranny.com
    scraper: galleryScraper
performerByURL:
  - action: scrapeXPath
    url:
      - dreamtranny.com/models/
    scraper: performerScraper
xPathScrapers:
  sceneScraper:
    scene:
      Title: &titleSel //div[@class="section-title"]/h4/text()
      Details: &detailsSel //p[@class="read-more"]/text()
      Date: &dateAttr
        selector: //small[@class="updated-at"]/text()
        postProcess:
          - parseDate: Jan 2, 2006
      Performers: &performersAttr
        Name: //a[contains(@class, "model-name")]/text()
      Image:
        selector: >-
          //video[contains(@class,"video-js")]/@poster
          |
          //div[contains(@class,"model-player")]//img/@src
          |
          //video[contains(@class,"vjs")]/@poster
        postProcess:
          - replace:
              - regex: ^(/.*)
                with: https://dreamtranny.com$1
      Studio: &studioAttr
        Name:
          fixed: Dream Tranny
      Tags: &tagsAttr
        Name: //div[@class="model-categories"]/a/text()
      URLs: &urlAttr
        selector: &urlSel //script[contains(.,"API_VIEW_URLS")]/text()
        postProcess: &sceneURLPostProcess
          - replace:
              - regex: .*/api(/update/\d+)/view_count.*
                with: "https://dreamtranny.com$1/"
      # URLs:
      #   selector: *urlSel
      #   postProcess: *sceneURLPostProcess
      Code:
        selector: *urlSel
        postProcess:
          - replace:
              - regex: .*/api/update/(\d+)/view_count.*
                with: "$1"
  sceneListScraper:
    common:
      $videoItemContent: //div[contains(@class, "video-item")]//div[@class="item-content"]
      $performerLink: //div[contains(@class, "video-item")]//div[@class="item-content"]//a[contains(@href, "/models/")]
      $videoLink: //div[contains(@class, "video-item")]//div[@class="item-content"]//a[contains(@href, "/update/")]
    scene:
      Title: $videoLink/text()
      Image: //div[contains(@class, "video-item")]//a[@class="item-thumb"]/img/@src
      Date:
        selector: $videoItemContent/div[2]/p
        postProcess:
          - parseDate: Jan 2, 2006
      URL:
        selector: $videoLink/@href
        postProcess: &urlPostProcess
          - replace:
              - regex: ^(/.*)
                with: https://dreamtranny.com$1
      Studio: *studioAttr
      # The following are not available on the listing page, so we will grab them from the scene page using the scene URL
      Details:
        selector: $videoLink/@href
        postProcess:
          - replace:
              - regex: ^(/.*)
                with: https://dreamtranny.com$1
          - subScraper:
              selector: *detailsSel
  galleryScraper:
    gallery:
      Title: *titleSel
      Details: *detailsSel
      Date: *dateAttr
      Tags: *tagsAttr
      Performers: *performersAttr
      Studio: *studioAttr
      URL: *urlAttr
  performerScraper:
    performer:
      Name: //h1[@class="model-title"]/text()
      Gender:
        fixed: transgender_female
      Image:
        selector: //div[@class="model-img"]/a/img[@class="img"]/@src
        postProcess: *urlPostProcess
      Country: //div[@class="model-content"]/p/span[text()="NATIONALITY"]/following-sibling::span[1]
      Birthdate:
        selector: //div[@class="model-content"]/p/span[text()="DATE OF BIRTH"]/following-sibling::span[1]
        postProcess:
          - replace:
              - regex: (\d)(st|[nr]d|th)
                with: "$1"
          - parseDate: January 2, 2006
driver:
  # site uses age verification for regions including UK and US
  # using CDP (set to true) with a VPN configured to another region, e.g. NL, will bypass this
  useCDP: false
# Last Updated April 30, 2026
