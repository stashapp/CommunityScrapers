name: "TadpolexStudio"
sceneByURL:
  - action: scrapeXPath
    url:
      - tadpolexstudio.com/trailers
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    common:
      $latestUpdate: //div[contains(@class, "latestUpdateBinfo")]
    scene:
      Studio:
        Name:
          fixed: TadpolexStudio
      Title: //h4
      Performers:
        Name: $latestUpdate//a[contains(@href, "/models/")]
        URLs: $latestUpdate//a[contains(@href, "/models/")]/@href
      Date:
        selector: $latestUpdate//comment()[contains(., "Date")]/following-sibling::text()
        postProcess:
          - parseDate: "01/02/2006"
      Tags:
        Name: $latestUpdate//div[contains(@class, "blogTags")]//a
      Image:
        selector: //meta[@property="og:image"]/@content
        postProcess:
          - replace:
              - regex: -\dx.jpg
                with: -full.jpg
      Details: $latestUpdate//div[contains(@class, "vidImgContent")]
