name: FoToRo Cuffed
# Scrapes: Cuffed Outdoors, Cuffed In Uniform
sceneByURL:
  - action: scrapeXPath
    url:
      - cuffedoutdoors.com
      - cuffedinuniform.com
    scraper: sceneScraper

xPathScrapers:
  sceneScraper:
    scene:
      Title:
        selector: //meta[@property="og:title"]/@content
      Date:
        selector: //meta[@property="article:published_time"]/@content
        postProcess:
          - replace:
            - regex: T.*$
              with: ""
          - parseDate: 2006-01-02
      Studio:
        Name:
          selector: //meta[@property="og:site_name"]/@content
          postProcess:
            - replace:
                - regex: '\.com'
                  with: ""
      Image: //meta[@property="og:image"]/@content
      # end wordpress scene scraper
      Performers:
        Name: //a[@rel="tag"]/text()
      Code: //a[contains(@href,"?add-to-cart")]/@data-product_sku
# Last Updated April 11, 2026