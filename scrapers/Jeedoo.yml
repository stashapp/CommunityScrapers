name: Jeedoo

sceneByURL:
  - action: scrapeXPath
    url:
      - jeedoo.com
    scraper: sceneScraper
groupByURL:
  - action: scrapeXPath
    url:
      - jeedoo.com
    scraper: movieScraper
sceneByName:
  action: scrapeXPath
  queryURL: https://www.jeedoo.com/porn-movies/?show_no_offer=1&search={}
  scraper: sceneSearch
sceneByQueryFragment:
  action: scrapeXPath
  queryURL: "{url}"
  scraper: sceneScraper

xPathScrapers:
  movieScraper:
    group:
      Name:
        selector: //title/text()
        postProcess:
          - replace:
              - regex: ((DVD|HD\-DVD|VHS\-Video)\s+\-\s+Porn\s+Movies\s+Streams\s+and\s+Downloads|\s+Stream\s+&\s+Download)
                with: ""
      Date:
        selector: //b[contains(text(), "Release date:")]/following-sibling::text()
        postProcess:
          - parseDate: January 2, 2006
      Studio:
        Name: //a[@data-original-title="Label" or @title="Label"]/text()
      Synopsis: //meta[@property="og:description"]/@content
      FrontImage: //img[contains(@class,"mainimage")][@rel="1"]/@src
      BackImage: //img[contains(@class,"mainimage")][@rel="2"]/@src
      URL: //link[@rel="alternate"][@hreflang="en"]/@href
      Tags:
        Name: //a[@title="Categorie / Genre"]/text()
      Director: //a[@title="Director"]/text()
      Duration:
        selector: //div[contains(text(),"Length:")]/text()[1]
        postProcess:
          - replace:
              - regex: ^\[(.+)\]$ # handle movies with proper [xx:xx:xx] duration
                with: $1
              - regex: ^[^\d]*(\d+)\s*min.* # handle movies with only xx mins duration
                with: "$1:00"
  sceneScraper:
    scene:
      Title: &title
        selector: //title/text()
        postProcess:
          - replace:
              - regex: ((DVD|HD\-DVD|VHS\-Video)\s+\-\s+Porn\s+Movies\s+Streams\s+and\s+Downloads|\s+Stream\s+&\s+Download)
                with: ""
      URL: &url
        selector: //link[@rel="alternate"][@hreflang="en"]/@href
      Date:
        selector: //b[contains(text(), "Release date:")]/following-sibling::text()
        postProcess:
          - parseDate: January 2, 2006
      Studio:
        Name: //a[@title="Label"][1]/text()
      Details: //meta[@property="og:description"]/@content
      Groups:
        Name: *title
        URL: *url
      Image: //img[contains(@class,"mainimage")][@rel="1"]/@src
      Performers:
        Name: //a[@title="Cast"]/text()
        URLs:
          selector: //a[@title="Cast"]/@href
          postProcess:
            - replace:
                - regex: ^
                  with: "https://www.jeedoo.com"
      Tags:
        Name: //a[@title="Categorie / Genre"]/text()
      Director: //a[@title="Director"]/text()
      Duration:
        selector: //div[contains(text(),"Length:")]/text()[1]
        postProcess:
          - replace:
              - regex: ^\[(.+)\]$ # handle movies with proper [xx:xx:xx] duration
                with: $1
              - regex: ^[^\d]*(\d+)\s*min.* # handle movies with only xx mins duration
                with: "$1:00"
  sceneSearch:
    common:
      $searchItem: //a[contains(@href,"/product/")]/img/..
    scene:
      Title: $searchItem/img/@alt
      URL:
        selector: $searchItem/@href
        postProcess:
          - replace:
              - regex: ^
                with: "https://www.jeedoo.com"
      Image: $searchItem/img/@data-src
