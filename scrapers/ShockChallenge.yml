name: ShockChallenge
sceneByURL:
  - action: scrapeXPath
    url:
      - shockchallenge.com
    scraper: sceneScraper

xPathScrapers:
  sceneScraper:
    scene:
      Title:
        selector: //meta[@property="og:title"]/@content
      Date:
        selector: //meta[@property="article:published_time"]/@content
        postProcess:
          - replace:
            - regex: T.*$
              with: ""
          - parseDate: 2006-01-02
      Studio:
        Name:
          selector: //meta[@property="og:site_name"]/@content
          postProcess:
            - replace:
                - regex: '\.com'
                  with: ""
      Details: //meta[@name="description"]/@content
      Image: //meta[@property="og:image"]/@content
      # end wordpress scene scraper
      Code:
        selector: //div[@class="post-meta-trio"]/text()[1]
        postProcess:
          - replace:
            - regex: '\|.+'
              with: ""
      Performers:
        Name: //a[@rel="tag"]/text()
