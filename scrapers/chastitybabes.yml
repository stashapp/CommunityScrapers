name: "ChastityBabes"
sceneByURL:
  - action: scrapeXPath
    url:
      - 'chastitybabes.com/archives'
    scraper: sceneScraper
    
xPathScrapers:
  sceneScraper:
    common:
      $performerTitle: //h1[@id="post-title"]/text()
    scene:
      Title:
        selector: $performerTitle
        postProcess:
          - replace:
            - regex: (.*) – (.*)
              with: $2
      Date:
        selector: //meta[@property="article:published_time"]/@content
        postProcess:
          - replace:
            - regex: T.*$
              with: ""
          - parseDate: 2006-01-02
      Details: 
        selector: //div[@class="postcontent"]/p
      Performers: 
        Name: 
          selector: $performerTitle
          postProcess:
            - replace:
              - regex: (.*) – (.*)|.*
                with: $1
      Tags: 
        Name: //a[@rel="category tag"]/text()
      Studio:
        Name:
          fixed: Chastity Babes
      Image: //img[@class="thumb_img"]/@src
      Code:
        selector: //div[@class="post_info"]/text()[1]
        postProcess:
          - replace:
            - regex: 'Update (.+) \|.+'
              with: "$1"
            - regex: "\t"
              with: ""

