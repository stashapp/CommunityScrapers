name: "VirtualTaboo"
sceneByURL:
  - action: scrapeXPath
    url:
      - virtualtaboo.com/videos/
    scraper: sceneScraper
groupByURL:
  - action: scrapeXPath
    url:
      - virtualtaboo.com/videos/
    scraper: movieScraper
performerByURL:
  - action: scrapeXPath
    url:
      - virtualtaboo.com/pornstars/
    scraper: performerScraper

xPathScrapers:
  sceneScraper:
    common:
      $info: &infoSel //div[@class="row video-detail"]
      $genInfo: //div[@class="row video-detail"]//div[starts-with(@class,"info")]
    scene:
      Title: &titleSel $info//h1
      Date: &dateAttr
        selector: $genInfo/span[@class="bullet"]/following-sibling::text()
        postProcess:
          - parseDate: 02 January, 2006
      Details: &detailsSel $info//*[@class="description"]
      Code:
        selector: //a[contains(@href, "signup.php?vid=")]/@href
        postProcess:
          - replace:
              - regex: .*=(\d+)$
                with: $1
      Tags:
        Name: $info//div[starts-with( @class,"tag-list")]/a/text()
      Performers:
        Name: $info//div[starts-with(@class,"info")]/a/text()
      Image: &imageSel //meta[@property="og:image"]/@content
      Studio:
        Name:
          fixed: "Virtual Taboo"
  movieScraper:
    common:
      $info: *infoSel
      $genInfo: //div[@class="row video-detail"]//div[@class="info mt-5"]
    group:
      Name:
        selector: *titleSel
        postProcess:
          - replace:
              - regex: ^
                with: "VirtualTaboo - "
      Duration:
        selector: $genInfo/br/following-sibling::text()[1]
        postProcess:
          - replace:
              - regex: \shour
                with: ":"
              - regex: \smin
                with: ":00"
      Date: *dateAttr
      Studio:
        Name:
          fixed: VirtualTaboo
      Synopsis: *detailsSel
      FrontImage: *imageSel
  performerScraper:
    performer:  
      Gender:
        fixed: "Female"
      Name:
        selector: //meta[@property="og:alt"]/@content
      URLs:
        selector: //link[@rel="canonical"]/@href
      Country: 
        selector: //div[@class="actor-detail__info-value"]
        postProcess:
          - replace:
            - regex: ",.*$"
              with: ""
      Birthdate:
        selector: //table[@class="actor-detail__params-table"]//td[text()="Birthday:"]/following-sibling::td/text()
        postProcess:
          - parseDate: Jan 2, 2006
      Tags:
        Name: //div[@class="actor-detail__tags"]/div/a/text()
      Image: //meta[@property="og:image"]/@content

