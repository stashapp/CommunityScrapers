name: TheNude
performerByName:
  action: scrapeXPath
  queryURL: https://www.thenude.com/index.php?page=search&action=searchModels&__form_name=navbar-search&m_aka=on&m_name={}
  scraper: performerSearch
performerByURL:
  - action: scrapeXPath
    url:
      - thenude.com
    scraper: performerScraper
sceneByURL: &coverByURL
  - action: scrapeXPath
    url:
      - thenude.com/cover
    scraper: coverScraper
galleryByURL: *coverByURL
imageByURL: *coverByURL

xPathScrapers:
  performerSearch:
    performer:
      Name:
        selector: //figcaption/span
        postProcess:
          - replace:
              - regex: "^AKA:"
                with: ""
      URLs:
        selector: //a[@class="model-name"]/@href
        postProcess:
          - replace:
              # Normalize to canonical /_NNNNN.htm form (strip name prefix)
              - regex: '(https://www\.thenude\.com/)[^_]*(_\d+\.htm)'
                with: '$1$2'
  performerScraper:
    performer:
      Name: //span[@class="model-name"]
      URLs:
        selector: //link[@rel="canonical"]/@href
        postProcess:
          - replace:
              # Normalize to canonical /_NNNNN.htm form (strip name prefix)
              - regex: '(https://www\.thenude\.com/)[^_]*(_\d+\.htm)'
                with: '$1$2'
      Twitter:
        selector: //a[text()="TWITTER"]//@href
        postProcess:
          - replace:
              - regex: 'https?://(?:www.)?twitter\.com\/'
                with: ""
              - regex: 'https?://(?:www.)?x\.com\/'
                with: ""
              - regex: \/$
                with: ""
              - regex: "tv"
                with: "TV"
              - regex: "official"
                with: "Official"
              - regex: '\s\s'
                with: " "
      Instagram:
        selector: //a[text()="INSTAGRAM"]//@href
        postProcess:
          - replace:
              - regex: 'https?://(?:www.)?instagram\.com\/'
                with: ""
              - regex: \/$
                with: ""
              - regex: "tv"
                with: "TV"
              - regex: "official"
                with: "Official"
              - regex: '\s\s'
                with: " "
      Birthdate:
        selector: //li/span[@class="list-quest"][contains(text(),'Born')]/following-sibling::text()
        postProcess:
          - replace:
              # Blank year-only dates (e.g. "1985")
              - regex: '^\s*\d{4}\s*$'
                with: ""
              # Blank month+year-only dates (e.g. "November 1985") to prevent
              # parseDate from defaulting the day to 01
              - regex: '^\s*[A-Za-z]+\s+\d{4}\s*$'
                with: ""
              # Blank any date containing "??" (e.g. "??-??-1996", "15-??-1996")
              # TheNude uses ?? as placeholder for unknown day/month components
              - regex: '.*\?\?.*'
                with: ""
          - parseDate: 2 January 2006
          - parseDate: January 2, 2006
      Ethnicity:
        selector: //li/span[@class="list-quest"][contains(text(),'Ethnicity')]/following-sibling::text()
        postProcess:
          - replace:
              - regex: "Ebony"
                with: "Black"
              - regex: "ebony"
                with: "Black"
              - regex: "white"
                with: "Caucasian"
              - regex: "White"
                with: "Caucasian"
              - regex: "hispanic"
                with: "Latin"
              - regex: "Hispanic"
                with: "Latin"
          - map:
              asian: Asian
              white: Caucasian
              black: Black
              hispanic: Latin
              Latina: Latin
              Arab: Middle Eastern
      Country:
        selector: //span[@itemprop="nationality"]/text()
        postProcess:
          - replace:
              - regex: '\bUnited\sStates\sof\sAmerica\b'
                with: "United States"
      HairColor:
        selector: //li/span[@class="list-quest"][contains(text(),'Hair')]/../text()
        postProcess:
          - replace:
              - regex: "Brown"
                with: Brunette
              - regex: '\bBrown\sHair\b'
                with: Brunette
              - regex: "Fair"
                with: Blonde
      Height:
        selector: //li/span[@class="list-quest"][contains(text(),'Height')]/following-sibling::text()
        postProcess:
          - replace:
              - regex: ^(\d+).+$
                with: "$1"
              # Height is an integer value. When the site returns "???" as the height value, replace it as if no value is returned
              - regex: \?\?\?
                with: ""
      Measurements:
        selector: //li/span[@class="list-quest"][contains(text(),'Measurements')]/../text()
        postProcess:
          - replace:
              - regex: \/.*$
                with: ""
      FakeTits:
        selector: //li/span[@class="list-quest"][contains(text(),'Breasts')]/../text()
        postProcess:
          - replace:
              - regex: ^[^\(]+\(([^\)]+)\).*$
                with: "$1"
              # "Real" maps to Stash internal value "Natural"
              - regex: Real
                with: "Natural"
              # "Fake" is already the correct Stash internal value — no mapping needed
              # "Medium" is not a breast enhancement value — blank it
              - regex: Medium
                with: ""
      CareerLength:
        selector: //li/span[@class="list-quest"][contains(text(),'Seen')]/following-sibling::text()
        concat: " - "
      Aliases:
        selector: //meta[@itemprop="additionalName"]/@content
        concat: ", "
      Image:
        selector: //link[@rel="canonical"]/@href
        postProcess:
          - replace:
              - regex: https:\/\/www\.thenude\.com\/
                with: "https://static.thenude.com/models/"
              - regex: \.htm
                with: "/medhead.jpg"
              # Encode spaces in performer names for valid image URLs
              - regex: ' '
                with: '%20'
      Gender:
        selector: //meta[@itemprop="gender"]/@content
      Details:
        selector: //li/span[@class="list-quest"][contains(text(),'Born')]/following-sibling::text()
        postProcess:
          - replace:
              - regex: ^
                with: "Actual scraped birthdate: "
  coverScraper:
    scene:
      Title: &title
        selector: //h1/span[2]/text()
        postProcess:
          - replace:
              - regex: ^\"(.*)\"$
                with: $1
      Date: &date
        selector: //h2[text()[contains(.,'Published on')]]
        postProcess:
          - replace:
              - regex: .*Published on\s(\d{4}-\d{2}-\d{2})
                with: $1
      Performers: &performers
        Name: //h1/span[1]/a/text()
        URLs: //h1/span[1]/a/@href
      Tags: &tags
        Name:
          selector: //meta[@itemprop="keywords"]/@content
          split: ","
      Studio: &studio
        Name: //h1/span[3]/a/text()
      Director: &director
        selector: //h2/a
      Image:
        selector: //a[@class="gallery-image-link"]/img/@src
    gallery:
      Title: *title
      Date: *date
      Performers: *performers
      Tags: *tags
      Studio: *studio
      Photographer: *director
    image:
      Title: *title
      Date: *date
      Performers: *performers
      Tags: *tags
      Studio: *studio
      Photographer: *director
# Last Updated April 27, 2026
