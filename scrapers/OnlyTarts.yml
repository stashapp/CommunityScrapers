name: OnlyTarts
sceneByURL: &byURL
  - action: scrapeXPath
    url:
      - onlytarts.com/video
    scraper: sceneScraper
galleryByURL: *byURL

xPathScrapers:
  sceneScraper:
    common:
      $desktopDetails: //div[contains(@class, "video-detail__desktop-sidebar")]
    scene:
      Title: &title $desktopDetails/h1
      Details: &details //details/p/text()
      Date: &date
        selector: $desktopDetails//div[@class="video-info__time"]
        postProcess:
          - replace:
              # TODO: This also contains the exact scene duration if we ever get
              # scrapers to return that field as well
              - regex: .*•\s+(.*)
                with: $1
          - parseDate: 2 January, 2006
      Image: //meta[@property="og:image"]/@content
      Code: &code
        selector: //a[contains(@href, "signup.php?vid=")]/@href
        postProcess:
          - replace:
              - regex: .*=(\d+)$
                with: $1
      Studio: &studio
        Name:
          fixed: OnlyTarts
      Tags: &tags
        Name: //a[contains(@class, "tags__item")]
      Performers: &performers
        Name: $desktopDetails//div[contains(@class, "video-info__text")]//a[contains(@href, "/model")]
        URLs: $desktopDetails//div[contains(@class, "video-info__text")]//a[contains(@href, "/model")]/@href
    gallery:
        Title: *title
        Details: *details
        Date: *date
        Code: *code
        Studio: *studio
        Tags: *tags
        Performers: *performers

