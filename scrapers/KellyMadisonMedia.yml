name: Kelly Madison Media
# scrapes: PornFidelity, TeenFidelity, Kelly Madison, 5Kteens, 5Kporn, 8Kmilfs, 8Kteens
sceneByURL:
  - action: scrapeXPath
    url:
      - pornfidelity.com
      - teenfidelity.com
      - kellymadison.com
    scraper: mainSite
  - action: scrapeXPath
    url:
      - 5kporn.com/episodes
      - 5kteens.com/episodes
      - 8kmilfs.com/episodes
      - 8kteens.com/episodes
    queryURL: "{url}"
    queryURLReplace:
      url:
        - regex: '5k(teens|porn)\.com'
          with: 8kteens.com
    scraper: 8ksite
xPathScrapers:
  mainSite:
    common:
      $ldjson: //script[@type="application/ld+json"][contains(text(), '"@type":"VideoObject"')]/text()
    scene:
      Title:
        selector: //h1
      Code:
        selector: $ldjson
        postProcess:
          - replace:
              - regex: '.+"description":"Episode (#\d+).+".+"@type":"Organization","name":"([^"]+)".+'
                with: $2 $1
              - regex: Teen Fidelity
                with: TF
              - regex: Porn Fidelity
                with: PF
              - regex: Kelly Madison
                with: KM
      Details: //div[contains(text(), "Episode Summary")]/../p/text()
      Date:
        selector: $ldjson
        postProcess:
          - replace:
              - regex: '.+"uploadDate":"([^T]+).+'
                with: "$1"
          - parseDate: 2006-01-02
      Performers:
        Name:
          selector: //div[contains(@class,"column-video-info")]/p[@class="mb-0"]/a/text()
          postProcess:
            - replace:
              - regex: "Madison"
                with: "Ryan Madison"
      Image:
        selector: $ldjson
        postProcess:
          - replace:
            - regex: '.+"thumbnailUrl":"([^"]+)".+'
              with: "$1"
      Studio:
        Name:
          selector: $ldjson
          postProcess:
            - replace:
                - regex: '.+"@type":"Organization","name":"([^"]+)".+'
                  with: "$1"
            - map:
                Porn Fidelity: PornFidelity
                Teen Fidelity: TeenFidelity
  8ksite:
    common:
      $url: //link[@rel="canonical"]/@href
    scene:
      Title: //strong[text()="Title:"]/following-sibling::a
      Code:
        selector: $url
        postProcess:
          - replace:
              - regex: .+?((5|8)\w+)/(\d+)
                with: "$1 #$3"
      URL:
        selector: $url
        postProcess:
          - replace:
            - regex: '8k.+\.com(.+5KP.+)'
              with: "5kporn.com$1"
            - regex: '8k.+\.com(.+5KT.+)'
              with: "5kteens.com$1"
            - regex: '8k.+\.com(.+8KM.+)'
              with: "8kmilfs.com$1"
            - regex: '8k.+\.com(.+8KT.+)'
              with: "8kteens.com$1"
      Date: //i[contains(@class, "fa-calendar")]/following-sibling::span
      Image: //meta[@property="og:image"]/@content
      Details:
        selector: //text()[contains(., 'Episode Summary')]/ancestor::p[1]
        postProcess:
          - replace:
              - regex: ^Episode Summary:\s+
                with: ""
      Performers:
        Name:
          selector: //strong[text()="Starring:"]/following-sibling::a
          postProcess:
            - map:
                Madison: Ryan Madison
      Tags:
        Name:
          selector: //div[contains(@class, "dropdown")]/ul/li[position() > 1]
          postProcess:
            - replace:
                # Chapters are named like 'Missionary (04:30)' so we strip the timestamp
                # TODO: scrape as markers if we ever get support for that
                - regex: \s*\(.+$
                  with: ""
                # KMM scenes often include the "Amazon position" and tag it as "Amazon",
                # but other studios use "Amazon" to mean a larger dominant woman.
                - regex: Amazon
                  with: Amazon Position
      Studio:
        Name:
          selector: $url
          postProcess:
            - replace:
              - regex: '.+?((5|8)\w+)/\d+'
                with: $1
              - regex: '8KM'
                with: 8K Milfs
              - regex: '8KT'
                with: 8K Teens
              - regex: '5KP'
                with: 5KPorn
              - regex: '5KT'
                with: 5Kteens

driver:
  cookies:
    - CookieURL: "https://www.5kteens.com/"
      Cookies:
        - Name: "nats"
          Domain: ".5kteens.com"
          ValueRandom: 23
          Path: "/"
    - CookieURL: "https://www.5kporn.com/"
      Cookies:
        - Name: "nats"
          Domain: ".5kporn.com"
          ValueRandom: 23
          Path: "/"

