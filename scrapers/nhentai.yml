name: nhentai

# intended to extract gallery ID from folder / zip / cbz file names as produces by gallery-dl ("1234567 some gallery name.zip")
galleryByFragment:
  action: scrapeJson
  queryURL: https://nhentai.net/api/v2/galleries/{filename}
  queryURLReplace:
    filename:
      - regex: '(?:\[|^)?(\d+).*' # capture numeric sequence at begining as gallery ID
        with: "$1"
  scraper: galleryScraper

galleryByURL:
  - action: scrapeJson
    url:
      - nhentai.net/g/
    queryURL: "{url}"
    queryURLReplace:
      url:
        - regex: '.+\/g\/(\d+)\/'
          with: https://nhentai.net/api/v2/galleries/$1
    scraper: galleryScraper

jsonScrapers:
  galleryScraper:
    gallery:
      Title:
        selector: title.pretty
      Details:
        selector: "{title.english,title.japanese}.@values"
        concat: "\n\n"
      URL: 
        selector: id
        postProcess:
          - replace:
            - regex: (\d+)
              with: "https://nhentai.net/g/$1/"
      Date:
        selector: upload_date
        postProcess:
          - parseDate: unix
      # no category tags because of gjson limitation
      Tags:
        Name: tags.#(type=="tag")#.name
      Performers:
        Name: tags.#(type=="artist")#.name
      Studio:
        Name: tags.#(type=="group").name

# apikey must be popualated manually
# shared apikey would bypass their ratelimit (as per site admin)
# see https://nhentai.net/api/v2/docs for details
driver:
  headers:
    - Key: Authorization
      Value: Key YOUR_APIKEY_HERE
    - Key: User-Agent
      Value: stashapp/stash scraper

