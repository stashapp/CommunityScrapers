name: Oops Family

sceneByURL: &byURL
  - action: scrapeXPath
    url:
      - oopsfamily.com/video
    scraper: sceneScraper
galleryByURL: *byURL
performerByURL:
  - action: scrapeXPath
    url:
      - oopsfamily.com/model
    scraper: performerScraper
xPathScrapers:
  sceneScraper:
    scene:
      Studio: &studio
        Name:
          fixed: "Oops Family"
      Title: &title
        selector: //div[@class="video-detail__title"]/text()
      Details: &details
        selector: //div[@data-id="description" and @class="hidden"]//text()
      Tags: &tags
        Name: //a[@class="tags__item"]//text()
      Performers: &performers
        Name: //div[@class="video-info__text"]//a[contains(@href, "/model")]/text()
        URLs: //div[@class="video-info__text"]//a[contains(@href, "/model")]/@href
      Image:
        selector: //script[contains(., "pluginSettings")]/text()
        postProcess:
          - replace:
              - regex: .*url":\s*"(.*poster[^"]*).*$
                with: $1
      Code: &code
        selector: //a[contains(@href, "signup.php?vid=")]/@href
        postProcess:
          - replace:
              - regex: .*=(\d+)$
                with: $1
      Date: &date
        selector: //div[@class="video-info__time"]//text()
        postProcess:
          - replace:
            - regex: (.*) • (.*)
              with: $2
          - parseDate: "2 January, 2006"
    gallery:
      Title: *title
      Details: *details
      Tags: *tags
      Performers: *performers
      Studio: *studio
      Code: *code
      Date: *date
  performerScraper:
    performer:
      Name:
        selector: //h1[@class="title-primary"]/text()
      URLs:
        selector: //link[@rel="canonical"]/@href
      Country:
        selector: //span[@class="pornstar-detail__info--title"]/text()
        postProcess:
          - replace:
            - regex: " ,.*$"
              with: ""
      Birthdate:
        selector: //table[contains(@class, "pornstar-detail__params--top")]//tr[td[@class="pornstar-detail__info--title" and normalize-space()="Birthday:"]]/td[2]/text()
        postProcess:
          - replace:
              - regex: '^\s*(.*?)\s*•.*$'
                with: "$1"
          - parseDate: Jan 2, 2006
      Measurements:
        selector: //table[contains(@class, "pornstar-detail__params--top")]//tr[td[@class="pornstar-detail__info--title" and normalize-space()="Measurements:"]]/td[2]/text()
        postProcess:
          - replace:
              - regex: '^\s*(.*?)\s*$'
                with: "$1"
      Height:
        selector: //table[contains(@class, "pornstar-detail__params--top")]//tr[td[@class="pornstar-detail__info--title" and normalize-space()="Height:"]]/td[2]/text()
        postProcess:
          - replace:
              - regex: '^\s*(\d+)\s+cm.*$'
                with: "$1"
      Weight:
        selector: //table[contains(@class, "pornstar-detail__params--top")]//tr[td[@class="pornstar-detail__info--title" and normalize-space()="Weight:"]]/td[2]/text()
        postProcess:
          - replace:
              - regex: '^\s*(\d+)\s+kg.*$'
                with: "$1"
      Image: //img[@class="pornstar-detail__picture"]/@src
