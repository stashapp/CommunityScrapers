name: Oops Family

sceneByURL: &byURL
  - action: scrapeXPath
    url:
      - oopsfamily.com/video
    scraper: sceneScraper
galleryByURL: *byURL
xPathScrapers:
  sceneScraper:
    scene:
      Studio: &studio
        Name:
          fixed: "Oops Family"
      Title: &title
        selector: //div[@class="video-detail__title"]/text()
      Details: &details
        selector: //div[@data-id="description" and @class="hidden"]//text()
      Tags: &tags
        Name: //a[@class="tags__item"]//text()
      Performers: &performers
        Name: //div[@class="video-info__text"]//a//text()
      Image:
        selector: //script[contains(., "pluginSettings")]/text()
        postProcess:
          - replace:
              - regex: .*url":\s*"(.*poster[^"]*).*$
                with: $1
      Code: &code
        selector: //a[contains(@href, "signup.php?vid=")]/@href
        postProcess:
          - replace:
              - regex: .*=(\d+)$
                with: $1
      Date: &date
        selector: //div[@class="video-info__time"]//text()
        postProcess:
          - replace:
            - regex: (.*) • (.*)
              with: $2
          - parseDate: "2 January, 2006"
    gallery:
      Title: *title
      Details: *details
      Tags: *tags
      Performers: *performers
      Studio: *studio
      Code: *code
      Date: *date
          
