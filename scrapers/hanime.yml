name: hanime
sceneByFragment:
  action: scrapeXPath
  queryURL: https://hanime.tv/videos/hentai/{filename}
  queryURLReplace:
    filename:
      - regex: ^(?P<slug>[a-z\-0-9]+?)-?(?P<resolution>[0-9]{3,4}p)?(-.1x)?\..+$
        with: $1
  scraper: sceneScraper
sceneByURL:
  - action: scrapeXPath
    url:
      - hanime.tv/
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    scene:
      Title: //h1
      Date:
        selector: //div[contains(., "Released")]/button/@data-tip
        postProcess:
          - parseDate: January 2, 2006
      Details:
        selector: //h2[contains(., "Synopsis")]/following-sibling::div[@data-expand-panel]//text()
        concat: "\n\n"
        postProcess:
          - replace:
              - regex: \n+Show\s+More
                with: ""
      Tags:
        Name: //a[contains(@class, "badge")]
      Studio:
        Name: //a[contains(., "Studio")]/strong
      Groups:
        Name:
          selector: //h2[contains(., "More from")]
          postProcess:
            - replace:
                - regex: More\s+from\s+
                  with: ""
        FrontImage: //section[@id="VideoDetails"]//img/@src
      Image:
        selector: //div[@class="contents"]/astro-island/@props
        postProcess:
          - replace:
              - regex: .*poster_url":[^"]+"([^"]+).*
                with: $1
