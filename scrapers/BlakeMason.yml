name: "Blake Mason"
sceneByURL:
  - action: scrapeXPath
    url:
      - blakemason.com/videos/
    scraper: sceneScraper

performerByURL:
  - action: scrapeXPath
    url:
      - blakemason.com/models
    scraper: performerScraper

xPathScrapers:
  sceneScraper:
    common:
      $imageUrl: //meta[@property="og:image"]/@content
    scene:
      Title: //div[contains(@class, "content-title")]//h2
      Date:
        selector: //span[contains(@class, "date")]
        postProcess:
          - parseDate: 01/02/2006
      Code:
        selector: $imageUrl
        postProcess:
          - replace:
              - regex: .*thumbs/(BM.?\d+)_.*
                with: $1
      Details:
        selector: //div[@class='content-description']/p[@class='text-justify']/text()
        concat: " "
      Studio:
        Name:
          fixed: "Blake Mason"
      Tags:
        Name:
          selector: //p[@class='tags']/a
      Performers:
        Name:
          selector: //div[contains(@class, 'models-wrap')]//h5
      Image:
        selector: $imageUrl
        postProcess:
          - replace:
              - regex: ^//
                with: https://

  performerScraper:
    performer:
      Name: //h2[contains(@class,'model-name')]//span/text()
      Gender:
        fixed: Male
      Height:
        selector: //div[contains(@class,'model-infos')]//li[h3[contains(translate(normalize-space(.),'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'height')]]/p/text()
        postProcess:
          - replace:
              - regex: ^\s+|\s+$
                with: ""
          - feetToCm: true
      PenisLength:
        selector: //div[contains(@class,'model-infos')]//li[h3[contains(translate(normalize-space(.),'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'dick size')]]/p/text()
        postProcess:
          - replace:
              - regex: ^\s+|\s+$
                with: ""
              - regex: ^(\d+(?:\.\d+)?)$
                with: "0'$1"
          - feetToCm: true
      Circumcised:
        selector: //div[contains(@class,'model-infos')]//li[h3[contains(translate(normalize-space(.),'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'cut / uncut')]]/p/text()
        postProcess:
          - replace:
              - regex: ^\s+|\s+$
                with: ""
          - map:
              Uncut: UNCUT
              Cut: CUT
              uncut: UNCUT
              cut: CUT
      EyeColor:
        selector: //div[contains(@class,'model-infos')]//li[h3[contains(translate(normalize-space(.),'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'eyes')]]/p/text()
        postProcess:
          - replace:
              - regex: ^\s+|\s+$
                with: ""
      HairColor:
        selector: //div[contains(@class,'model-infos')]//li[h3[contains(translate(normalize-space(.),'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'hair')]]/p/text()
        postProcess:
          - replace:
              - regex: ^\s+|\s+$
                with: ""
      Details:
        selector: //p[contains(@class,'description')]/text()
        postProcess:
          - replace:
              - regex: \s+|\xA0+
                with: " "
              - regex: ^\s+|\s+$
                with: ""
      Image:
        selector: //div[contains(@class,'model-img')]//img/@src
        postProcess:
          - replace:
              - regex: ^//(.*)$
                with: "https://$1"

