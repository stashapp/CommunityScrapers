name: Eroteric
sceneByURL:
  - action: scrapeXPath
    url:
      - eroteric.com
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    scene:
      Title: //title
      Date:
        selector: //li[@class="bwp-single-post-meta-date"]/span[@class="date updated"]/text()
        postProcess:
          - parseDate: 2006-01-02
      Details: //div[@class="bwp-content entry-content clearfix"]/p
      Performers:
        Name: //div[@class="bwp-post-lenght zor_tags_cat"]/a/text()
      Tags:
        Name: //a[@rel="category tag"]/text()
      Studio:
        Name:
          fixed: Eroteric
      Image:
        selector: //video/@poster
        postProcess:
          - replace:
            - regex: "-scaled"
              with: ""
 
