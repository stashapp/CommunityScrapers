name: TheNude
performerByName:
  action: script
  script:
    - python
    - TheNude.py
    - performer-by-name
performerByURL:
  - action: script
    url:
      - thenude.com
    script:
      - python
      - TheNude.py
      - performer-by-url
sceneByURL: &coverByURL
  - action: scrapeXPath
    url:
      - thenude.com/cover
    scraper: coverScraper
galleryByURL: *coverByURL
imageByURL: *coverByURL
sceneByName:
  action: script
  script:
    - python
    - TheNude.py
    - scene-by-name
sceneByQueryFragment:
  action: script
  script:
    - python
    - TheNude.py
    - scene-by-query-fragment
galleryByFragment:
  action: script
  script:
    - python
    - TheNude.py
    - gallery-by-fragment

xPathScrapers:
  coverScraper:
    scene:
      Title: &title
        selector: //h1/span[2]/text()
        postProcess:
          - replace:
              - regex: ^\"(.*)\"$
                with: $1
      Date: &date
        selector: //h2[text()[contains(.,'Published on')]]
        postProcess:
          - replace:
              - regex: .*Published on\s(\d{4}-\d{2}-\d{2})
                with: $1
      Performers: &performers
        Name: //h1/span[1]/a/text()
        URLs: //h1/span[1]/a/@href
      Tags: &tags
        Name:
          selector: //meta[@itemprop="keywords"]/@content
          split: ","
      Studio: &studio
        Name: //h1/span[3]/a/text()
      Director: &director
        selector: //h2/a
      Image:
        selector: //a[@class="gallery-image-link"]/img/@src
    gallery:
      Title: *title
      Date: *date
      Performers: *performers
      Tags: *tags
      Studio: *studio
      Photographer: *director
    image:
      Title: *title
      Date: *date
      Performers: *performers
      Tags: *tags
      Studio: *studio
      Photographer: *director
