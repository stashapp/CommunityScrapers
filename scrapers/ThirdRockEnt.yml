    common:
      $scene: //div[contains(@class, "video-content")]
    scene:
      Title: //h1[@class="title_bar trailer_title text-center text-3xl text-accent"]
      Details: $scene//p[@id="description"]
      Date:
        selector: $scene//label[contains(.,"Date Added")]/following-sibling::text()
        postProcess:
          - parseDate: 2006-01-02
      URLs: &url //meta[@property="og:url"]/@content
      Performers:
        Name: $scene//a[contains(@href, "/models/")]
      Tags:
        Name: $scene//a[contains(@href, "/porn-categories/")]
      Image:
        selector: //meta[@property="og:url"]/@content | //meta[@property="og:image"]/@content
        concat: __SEP__
        postProcess:
          - replace:
              # CDN links have expiration times, validation tokens and are usually downscaled:
              # let's grab the original image from the site domain instead
              # https://regex101.com/r/tnFllS
              - regex: https://(?P<domain>[^/]+).+__SEP__https://([^/]+mjedge\.net)/(?P<path>[^?]+).+
                with: https://$domain/$path
              # If images have been resized we can get the full image instead, suffering no loss of quality (and maybe getting higher qualities!)
              - regex: (:?-[1-4]x)?\.jpg$
                with: "-full.jpg"
      Studio:
        Name:
          selector: *url
