name: PMVHaven
sceneByURL:
  - action: scrapeJson
    url:
      - pmvhaven.com/video/
    queryURL: https://pmvhaven.com/api/videos/{url}
    queryURLReplace:
      url:
        - regex: .*([a-f0-9]{24}).*
          with: $1
    scraper: sceneScraper
sceneByFragment:
  action: scrapeJson
  queryURL: https://pmvhaven.com/api/videos/phash?hash={phash}&didstance=8
  scraper: resultScraper

jsonScrapers:
  sceneScraper:
    scene:
      Title: data.title
      Date:
        selector: data.uploadDate
        postProcess:
          - replace:
              - regex: "T(.*)$"
                with: ""
          - parseDate: 2006-01-02

      Details: data.description
      Tags:
        Name: data.tags
      Performers:
        Name: data.starsTags
      Image: data.thumbnailUrl
      Studio:
        Name: data.uploaderUsername
      URL:
        selector: data._id
        postProcess:
          - replace:
            - regex: (.*)
              with: https://pmvhaven.com/video/$1
  resultScraper:
    scene:
      Title: videos.#.title
      Date:
        selector: videos.#.uploadDate
        postProcess:
          - replace:
              - regex: "T(.*)$"
                with: ""
          - parseDate: 2006-01-02

      Details: videos.#.description
      Tags:
        Name: videos.#.tags.@values
      Performers:
        Name: videos.#.starsTags.@values
      Image: videos.#.thumbnailUrl
      Studio:
        Name: videos.#.uploaderUsername
      URL:
        selector: videos.#._id
        postProcess:
          - replace:
            - regex: (.*)
              with: https://pmvhaven.com/video/$1

driver:
  headers:
    - Key: User-Agent
      Value: stash-scraper/v1

