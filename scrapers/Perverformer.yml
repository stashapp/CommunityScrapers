name: Perverformer
sceneByURL:
  - action: scrapeXPath
    url:
      - perverformer.com/en/video/
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    common:
      $tags: //div[@class="tag-cloud"]
    scene:
      Title:
        selector: //main/h1
      Date:
        selector: //script[@type="application/ld+json"]
        postProcess:
          - javascript: |
              // Parse JSON
              if (value && value.length) {
                return JSON.parse(value).uploadDate
              }
          - parseDate: 2006-01-02T15:04:05+0000
      Performers:
        Name: $tags/a/span[contains(@class, "category-21") or contains(@class, "category-22")]
      Tags:
        Name: $tags/a/span[not(contains(@class, "category-21")) and not(contains(@class, "category-22"))]
      Details:
        selector: //main/div[@class="columns"]/div[@class="secondary"]/div[@class="area"]/span[@class="collapsible-partial"]
        concat: "\n"
      Image: //main/div[@class="columns"]//video/@poster
      URL: //link[@rel="canonical"]/@href
      Studio:
        Name:
          fixed: Perverformer
# Last Updated April 11, 2026
