# yaml-language-server: $schema=../validator/scraper.schema.json
name: Bang
sceneByURL:
  - action: scrapeXPath
    url:
      - bang.com/video
      - bangpremium.com/video
    scraper: sceneScraper
sceneByName:
  action: scrapeXPath
  queryURL: https://www.bang.com/videos?term={}
  scraper: sceneSearch
sceneByQueryFragment:
  action: scrapeXPath
  queryURL: "{url}"
  scraper: sceneScraper
groupByURL:
  - action: scrapeXPath
    url:
      - bang.com/dvd
      - bangpremium.com/dvd
    scraper: movieScraper
performerByName:
  action: scrapeXPath
  queryURL: https://www.bang.com/pornstars?term={}
  scraper: performerSearch
performerByURL:
  - action: scrapeXPath
    url:
      - bang.com/pornstar
      - bangpremium.com/pornstar
    scraper: performerScraper
galleryByURL:
  - action: scrapeXPath
    url:
      - bang.com/photos/
      - bangpremium.com/photos/
    scraper: sceneScraper
xPathScrapers:
  sceneSearch:
    common:
      $scenes: //div[contains(@class, "video_container")]
    scene:
      Title: $scenes//a/span
      Date:
        selector: $scenes//span[contains(., "•")]/following-sibling::text()
        postProcess:
          - parseDate: Jan 02, 2006
      Image: $scenes//img/@src
      URL:
        selector: $scenes//a[contains(@href, "/video/")]/@href
        postProcess: &prependHost
          - replace:
              - regex: ^
                with: https://www.bang.com
  sceneScraper:
    common:
      $escapedJson: //div[@data-live-name-value="Video:RelatedPhotos"]/@data-live-props-value
      $movie: //div[@data-controller="video-entry"]//a[contains(@href,"/dvd/")]//div[contains(@class,"name")]/span[1]
      $performer: //p[contains(@class,"capitalize") and contains(text(),"With:")]/a[contains(@href,"/pornstar/")]
      $title: //meta[@property="og:title"]/@content
    scene:
      Title: $title
      Details: //meta[@name="description"]/@content
      Image:
        selector: //meta[@property="og:image"]/@content
      Date: //meta[@property="video:release_date"]/@content
      Tags:
        Name:
          selector: //a[@class="genres"]
      Performers: &performers
        Name: $performer
        URLs:
          selector: $performer/@href
          postProcess: *prependHost
      Studio:
        Name:
          selector: //a[starts-with(@href, "/originals/")]/text()
          postProcess: &studioReplace
            - replace:
                - regex: ^yngr\.com$
                  with: "YNGR"
      Groups:
        Name: $movie
        URL:
          selector: $movie/@href
          postProcess: *prependHost
      Code:
        selector: //meta[@property="og:video"]/@content
        postProcess:
          - replace:
              - regex: .*/(\d+)/.*
                with: $1
    gallery:
      Title: $title
      Details: //meta[@name="twitter:description"]/@content
      Date:
        selector: $escapedJson
        postProcess:
          - replace:
              - regex: .*releaseDate[^\d]*(\d{4}-\d{2}-\d{2}).*
                with: $1
      Performers: *performers
      Tags:
        Name:
          selector: $escapedJson
          postProcess:
            - javascript: |
                if (value?.length) {
                  console.debug("Parsing tags from JSON");
                  var tags = [];
                  // replace HTMLescaped quotes and parse JSON
                  var json = JSON.parse(value.replace(/&quot;/g, '"'));
                  if (json?.relatedVideo?.genres?.length) {
                    tags.push(...json.relatedVideo.genres);
                  }
                  if (json?.relatedVideo?.actions?.length) {
                    tags.push(...json.relatedVideo.actions.map(a => a.name));
                  }
                  return tags;
                }
          split: ","
      Studio:
        Name:
          selector: //a[contains(@href, "/originals/")]/text()
          postProcess: *studioReplace
      Code:
        selector: $escapedJson
        postProcess:
          - replace:
              - regex: .*identifier[^\d]*(\d+).*
                with: $1
  movieScraper:
    common:
      $details: //div[@class="w-full"][1]
      $image: //body/div[contains(@class,"w-full")][3]/div/div/picture//img[contains(@src,"/front")]/@src
    group:
      Name:
        selector: $details/h1
      Duration:
        selector: //p[contains(text(),"Date:")]/span[2]/text()
      Date:
        selector: //p[contains(text(),"Date:")]/span[1]/text()
        postProcess:
          - parseDate: Jan 02, 2006
      Synopsis: $details//p[contains(@class,"clear-both")]
      Studio:
        Name: $details//p[contains(text(),"Studio")]/a/text()
      FrontImage:
        selector: $image
        postProcess:
          - replace:
              - regex: \?.*$
                with: ""
      BackImage:
        selector: $image
        postProcess:
          - replace:
              - regex: /front\.jpg?.*$
                with: "/back.jpg"
  performerSearch:
    common:
      $performers: //div[contains(@class, "search_container")]
    performer:
      Name: $performers//a//span
      URLs:
        selector: $performers//a/@href
        postProcess: *prependHost
  performerScraper:
    common:
      $overlay: //div[@class="flex flex-col md:items-start items-center"]
    performer:
      Name: $overlay/h2
      URLs:
        selector: //link[@rel="canonical"][1]/@href
      Birthdate:
        selector: $overlay//div[contains(text(),"Born")]/span[contains(text(),"old")]
        postProcess:
          - replace:
              - regex: \s*(\w+\s)(\d+),(\s\d{4}).*
                with: $1$2$3
          - parseDate: January 2 2006
      HairColor:
        selector: $overlay//div[contains(@class,"md:text-left")]/text()[contains(.,"Hair Color")]/following-sibling::span[1]
      Ethnicity:
        selector: $overlay//div[contains(@class,"md:text-left")]/text()[contains(.,"Ethnicity")]/following-sibling::span[1]
      EyeColor:
        selector: $overlay//div[contains(@class,"md:text-left")]/text()[contains(.,"Eye Color")]/following-sibling::span[1]
      Aliases:
        selector: $overlay//h1/following-sibling::div
      Image:
        selector: //div[@class="relative"]//img/@src
        postProcess:
          - replace:
              - regex: \?.+$
                with: ""
